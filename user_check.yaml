---
- name: Check if user exists
  hosts: all
  gather_facts: no
  tasks:
    - name: Check for user existence
      ansible.builtin.command: "id vidhumal"
      register: user_check
      ignore_errors: yes

    - name: Report user existence
      ansible.builtin.debug:
        msg: "{{ 'User vidhumal exists on ' ~ inventory_hostname if user_check.rc == 0 else 'User vidhumal does NOT exist on ' ~ inventory_hostname }}"


